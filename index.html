<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Slider de Divs</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .slider {
      position: relative;
      width: 100%;
      height: 300px;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      display: none;
      color: white;
      font-size: 2em;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slide.active {
      display: flex;
    }

    .slide1 { background: crimson; }
    .slide2 { background: royalblue; }
    .slide3 { background: seagreen; }
    .slide4 { background: goldenrod; }
    .slide5 { background: purple; }

    .controls {
      text-align: center;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 0 5px;
      font-size: 1em;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="slider">
    <div class="slide slide1">Texto del DIV 1</div>
    <div class="slide slide2">Texto del DIV 2</div>
    <div class="slide slide3">Texto del DIV 3</div>
    <div class="slide slide4">Texto del DIV 4</div>
    <div class="slide slide5">Texto del DIV 5</div>
  </div>

  <div class="controls">
    <button onclick="prevSlide()">Anterior</button>
    <button onclick="nextSlide()">Siguiente</button>
  </div>

  <script>
    let current = 0;
    const slides = document.querySelectorAll(".slide");

    function showSlide(index) {
      slides.forEach(s => s.classList.remove("active"));
      slides[index].classList.add("active");
    }

    function nextSlide() {
      current = (current + 1) % slides.length;
      showSlide(current);
    }

    function prevSlide() {
      current = (current - 1 + slides.length) % slides.length;
      showSlide(current);
    }

    // Inicializar mostrando el primero
    showSlide(current);
  </script>

</body>
</html>
